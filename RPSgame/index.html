<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROCK PAPER SCISSORS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div><h1>ROCK PAPER SCISSORS</h1></div>
    <div class="choices">
      <button id="rock" onclick="play('rock')">👊</button>
      <button id="paper" onclick="play('paper')">🖐️</button>
      <button id="scissors" onclick="play('scissor')">✌️</button>
    </div>
    <div class="display">
      <div id="playerDisplay">PLAYER :</div>
      <div id="computerDisplay">COMPUTER :</div>
    </div>

    <div id="result"></div>

    <div class="score">
      <h2>SCORE</h2>
      <div id="playerScore">
        PLAYER : <span id="playerScoreDisplay">0</span>
      </div>
      <div id="computerScore">
        COMPUTER : <span id="computerScoreDisplay">0</span>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
